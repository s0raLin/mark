appId: com.notemark.app
productName: NoteMark
asar: true
npmRebuild: false

directories:
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - "!images/**/*"
  - "!server/cmd/server/data/**/*"
  - "!dist/uploads/**/*"

extraResources:
  - from: server/cmd/server
    to: server
    filter:
      - "**/*"
      - "!data/**/*"
      - "!public/uploads/**/*"

# Electron 镜像配置
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.svg

mac:
  target:
    - dmg
  icon: build/icon.svg

linux:
  target:
    - deb
    - AppImage
  icon: build/icon.svg
  category: Office

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
